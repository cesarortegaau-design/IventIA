services:
  - type: web
    name: iventia-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  - type: web
    name: iventia-admin
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    buildArgs:
      - key: VITE_API_URL
        fromService:
          name: iventia-api
          type: web
          property: host
    envVars:
      - key: PORT
        value: 3000

  - type: web
    name: iventia-portal
    runtime: docker
    dockerfilePath: ./Dockerfile.portal
    dockerContext: .
    buildArgs:
      - key: VITE_API_URL
        fromService:
          name: iventia-api
          type: web
          property: host
    envVars:
      - key: PORT
        value: 3002
