services:
  - type: web
    name: iventia-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: iventia-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://admin.vercel.app,https://portal.vercel.app,https://arte-capital.vercel.app
