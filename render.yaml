services:
  - type: web
    name: iventia-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://ivent-ia-arte-capital.vercel.app,https://iventia-admin.vercel.app,https://iventia-portal.vercel.app
