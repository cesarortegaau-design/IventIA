services:
  postgres:
    image: postgres:15-alpine
    container_name: iventia_postgres
    environment:
      POSTGRES_USER: iventia
      POSTGRES_PASSWORD: iventia_dev_pass
      POSTGRES_DB: iventia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iventia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iventia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
